<h1>The Joane Greene Archive — No JS Version</h1>
<p><b>One woman. One record. May 1682. Pawtuxet, RI.</b> Joane Greene appears once, consenting in a deed witnessed by William Carpenter (non-Quaker speculator), John Wickes, and Samuel Gorton. Grade: PROVEN.</p>
<h2>Evidence Key</h2>
<ul><li>🟢 PROVEN — Direct primary source located</li><li>🔵 PROBABLE — Strong chain, one inferential link</li><li>🟡 UNVERIFIED — Claim exists, source not yet pulled</li><li>🔴 NULL — Searched and not found OR proven compilation layer. NULL is data.</li></ul>
<h2>The Four Laws</h2>
<p><b>Law 1: Contradictions Are Held, Not Hidden</b> — If sources conflict, both displayed side-by-side. No smoothing.</p>
<p><b>Law 2: Documentary Evidence Over Narrative</b> — One 1672 deed > 100 family trees.</p>
<p><b>Law 3: No Premature Disqualification</b> — We don't dismiss Anashuecot as 'male' because a scribe wrote 'his marke' for 7 signers.</p>
<p><b>Law 4 — Contamination Law: Compilation Layers Are Toxic</b> — alfredgibbs.com, WikiTree, Findagrave, Ancestry user trees = quarantined in /contamination/. They are Echo Chambers, not sources.</p>
<h2>Four-Agent System</h2>
<p>🔭 <b>Explorer</b> — Finds every primary, even if it breaks theory. Hostile to comfort.</p>
<p>⚔️ <b>Hostile Reviewer</b> — Tries to destroy theory using colonial law & scribal practice. E.g., Is 'his marke' gender or tic?</p>
<p>🧬 <b>Synthesizer</b> — Rebuilds kinship map after attack, holding contradictions. Network, not tree.</p>
<p>🏛️ <b>Archivist</b> — No citation = does not exist. Box.Folder.Page required.</p>
<h2>How To Navigate</h2>
<p>/sources/ = primary scans 600 DPI, IIIF. /contamination/ = quarantined compilation layers (DO NOT CITE). /digitization/ = lab notes. /theory/ = frameworks. /notes/ = name variants & scribe analysis.</p>
