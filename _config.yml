# Jekyll Configuration for Joan Lineage Theory
# https://jekyllrb.com/docs/configuration/

# Site Settings
title: "The Joan Project"
description: "No Narrative Smoothing — A historical research organism built from primary sources, hostile review, and structural reconstruction."
baseurl: "/joan-lineage-theory"  # Change to "" if using custom domain
url: "https://lemuwah.github.io"

# Build Settings
markdown: kramdown
highlighter: rouge
permalink: pretty

# Exclude files from build
exclude:
  - README.md
  - LICENSE
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - ".git"
  - ".github"
  - agents/explorer/*.md
  - agents/hostile_reviewer/*.md
  - agents/synthesizer/*.md
  - research_queue/*.md

# Include specific files (if needed)
include:
  - _pages
  - assets

# Plugins (GitHub Pages supports these)
plugins:
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-feed

# Default front matter for pages
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"

# Collections (for organizing research outputs)
collections:
  hypotheses:
    output: true
    permalink: /:collection/:name/
  reviews:
    output: true
    permalink: /:collection/:name/
  sources:
    output: true
    permalink: /:collection/:name/

# SEO / Social
author:
  name: "Quidnessett Research Group"
  email: ""

# GitHub Pages specific
# https://pages.github.com/versions/
github:
  repository: "lemuwah/joan-lineage-theory"
nav:
  - Home: index.md
  - Primary Sources:
      - Fones Purchase (1672): primary_sources/1672_fones.md
  - Theory:
      - Kin Map: theory/anashuecot_kin_map.md
  - Sources:
      - Bibliography: sources/sources.md
  - Notes:
      - Name Variants: notes/name_variants.md
  - Research Queue:
      - July 11 Expansion: research_queue/2026-07-11_expand_kpw_search.md
